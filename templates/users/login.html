{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <h2>Вход</h2>

    <form method="post" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn">Войти</button>
    </form>

    <p>
        Нет аккаунта?
        <a href="{% url 'register' %}">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
